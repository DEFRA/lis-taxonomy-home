#
# tag-repo.yml
# This workflow tags feature and hotfix builds for either branch pushes
# or merged pull requests from those branches.
#
name: tag-repo.yml
on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
  push:
    branches:
      - feature/LREG-*
      - hotfix/LREG-*

permissions:
  contents: write

jobs:
  tag-repo:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.LIS_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.LIS_RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Check out pushed branch
        if: github.event_name == 'push'
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Check out merge commit
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve branch context
        id: branch
        run: |
          set -euo pipefail
          shopt -s nocasematch

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRN_NAME="${{ github.event.pull_request.head.ref }}"
          else
            BRN_NAME="${{ github.ref_name }}"
          fi
          BRN_NAME="$(printf '%s' "$BRN_NAME" | tr '[:upper:]' '[:lower:]')"

          if [[ $BRN_NAME =~ hotfix/([a-z]+-[0-9]+)-.* ]]; then
            STORY_ID="${BASH_REMATCH[1]}"
            echo "STORY_ID=${STORY_ID}" >> "$GITHUB_OUTPUT"
            echo "BUMP_TYPE=patch" >> "$GITHUB_OUTPUT"
          elif [[ $BRN_NAME =~ feature/([a-z]+-[0-9]+)-.* ]]; then
            STORY_ID="${BASH_REMATCH[1]}"
            echo "STORY_ID=${STORY_ID}" >> "$GITHUB_OUTPUT"
            echo "BUMP_TYPE=minor" >> "$GITHUB_OUTPUT"
          else
            echo "Branch does not have the correct name!" >&2
            exit 1
          fi

          echo "BRANCH_NAME=${BRN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Calculate next tag
        id: version
        env:
          STORY_ID: ${{ steps.branch.outputs.STORY_ID }}
          BUMP_TYPE: ${{ steps.branch.outputs.BUMP_TYPE }}
          BRANCH_NAME: ${{ steps.branch.outputs.BRANCH_NAME }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          latest_main_tag=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

          if [ -z "$latest_main_tag" ]; then
            major=0
            minor=0
            patch=0
          else
            version="${latest_main_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
          fi

          case "$BUMP_TYPE" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          prerelease_prefix="${major}.${minor}.${patch}-${STORY_ID}-alpha."
          latest_story_tag=$(git tag --sort=-v:refname | grep -E "^${major}\.${minor}\.${patch}-${STORY_ID}-alpha\.[0-9]+$" | head -n1 || true)

          if [ -z "$latest_story_tag" ]; then
            prerelease_number=1
          else
            prerelease_number="${latest_story_tag##*.}"
            prerelease_number=$((prerelease_number + 1))
          fi

          next_tag="${prerelease_prefix}${prerelease_number}"
          message="Repository build ${next_tag} for ${BRANCH_NAME} via ${EVENT_NAME}"

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "message=$message" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          MSG: ${{ steps.version.outputs.message }}
        run: |
          set -euo pipefail

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi

          echo "Tagging $TAG with message: $MSG"
#          git config user.name "lis-release-tagger[bot]"
#          git config user.email "lis-release-tagger[bot]@users.noreply.github.com"

#          git tag -a "$TAG" -m "$MSG"
#          git push origin "refs/tags/$TAG"
