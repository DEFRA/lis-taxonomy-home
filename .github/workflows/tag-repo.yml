#
# tag-repo.yml
# This workflow is triggered when PR is merged to main.
#
name: tag-repo.yml
on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  tag:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get branch name
        run: |
          shopt -s nocasematch
          BRN_NAME="${{ github.event.pull_request.head.ref }}"
  
          if [[ $s =~ feature/([a-z]+-[0-9]+)-.* ]]; then
            STORY_ID="${BASH_REMATCH[1]}"
            echo "STORY_ID=${STORY_ID}" >> "$GITHUB_OUTPUT"
            echo "STORY_ID found ${STORY_ID}"
          else
            echo "Branch does not have the correct name!" >&2
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MinVer
        run: dotnet tool install --global minver-cli

      - name: Add global tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Calc the version number
        run: |
          TAG="${{ github.event.pull_request.number }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "$TAG"
          git push origin "$TAG"
